name: Secure CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t myapp:latest .

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          npm install

      - name: Run tests
        run: |
          npm test

  sast:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v3

      - name: Run SAST with SonarQube
        run: echo "SAST scanning..."

  sca:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v3

      - name: Dependency Scan
        run: echo "Scanning dependencies..."

  container_scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v3

      - name: Build image
        run: docker build -t myapp .

      - name: Scan container with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: myapp
          exit-code: 1
          severity: CRITICAL,HIGH

  deploy:
    runs-on: ubuntu-latest
    needs: container_scan

    steps:
      - name: Deploy step
        run: echo "Deploying to test environment..."